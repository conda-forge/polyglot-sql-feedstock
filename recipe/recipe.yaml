schema_version: 1

context:
  version: "0.5.16"

package:
  name: polyglot-sql
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/polyglot-sql/polyglot_sql-${{ version }}.tar.gz
  sha256: 9bb747bc79bafa14181861a8e9ee5e3b21643f1d6b678d4abfa5360503b7c6fb

build:
  number: 0
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - maturin >=1.7,<2.0
  run:
    - python

tests:
  - python:
      imports:
        - polyglot_sql
  - requirements:
      run:
        - python
        - pip
    script:
      - pip check
      - python -c "import polyglot_sql; assert polyglot_sql.transpile('SELECT IFNULL(a, b) FROM t', read='mysql', write='postgres') == ['SELECT COALESCE(a, b) FROM t']"

about:
  homepage: https://github.com/tobilg/polyglot
  repository: https://github.com/tobilg/polyglot
  documentation: https://polyglot.gh.tobilg.com
  summary: Rust-powered SQL transpiler for 32+ dialects.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - tobilg
    - geoHeil
